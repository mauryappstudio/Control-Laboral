<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1"/>
<meta name="theme-color" content="#07111f"/>
<meta name="description" content="Sistema de gestión laboral: anticipos, préstamos, vacaciones y producción de trabajadores"/>

<!-- PWA: Android / Chrome -->
<link rel="manifest" href="manifest.json"/>

<!-- PWA: iOS / Safari -->
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Control Laboral"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>

<!-- Icons -->
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png"/>
<link rel="shortcut icon" href="favicon.ico"/>

<title>Control Laboral</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
svg{width:18px;height:18px;display:inline-block;vertical-align:middle;flex-shrink:0}
:root{
  --bg:#0d1117;
  --bg2:#161b22;
  --bg3:#1c2333;
  --bg4:#21262d;
  --border:#30363d;
  --border2:#484f58;
  --blue:#2563eb;
  --blue2:#3b82f6;
  --blue-glow:rgba(37,99,235,0.18);
  --green:#10b981;
  --green2:#34d399;
  --green-glow:rgba(16,185,129,0.15);
  --red:#ef4444;
  --red-glow:rgba(239,68,68,0.15);
  --amber:#f59e0b;
  --amber-glow:rgba(245,158,11,0.15);
  --t1:#f0f6ff;
  --t2:#8b949e;
  --t3:#484f58;
  --r:10px;--r2:14px;--r3:6px;
  --sh:0 4px 24px rgba(0,0,0,.5);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}

/* ── LOGIN ── */
#login-screen{align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(ellipse at 50% 0%,rgba(37,99,235,.12) 0%,transparent 60%)}
.login-box{width:100%;max-width:400px}
.login-logo{text-align:center;margin-bottom:36px}
.logo-icon{width:60px;height:60px;border-radius:16px;
  background:linear-gradient(135deg,var(--blue2),var(--green));
  display:inline-flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:14px;
  box-shadow:0 8px 32px rgba(37,99,235,.35)}
.login-logo h1{font-size:1.7rem;font-weight:800;letter-spacing:-.03em}
.login-logo p{color:var(--t2);font-size:.82rem;margin-top:4px}
.login-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);padding:28px}
.login-card h2{font-size:1.05rem;font-weight:600;margin-bottom:20px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:.72rem;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.06em}
.field input,.field select,.field textarea{
  background:var(--bg3);border:1px solid var(--border);border-radius:var(--r3);
  padding:10px 13px;color:var(--t1);font-size:.9rem;font-family:inherit;width:100%;
  transition:border-color .2s,box-shadow .2s}
.field input:focus,.field select:focus,.field textarea:focus{
  outline:none;border-color:var(--blue2);box-shadow:0 0 0 3px var(--blue-glow)}
.field input::placeholder,.field textarea::placeholder{color:var(--t3)}
.field textarea{resize:vertical;min-height:72px}
.login-hint{font-size:.75rem;color:var(--t3);text-align:center;margin-top:18px}
.login-hint span{color:var(--blue2)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--r3);
  font-size:.85rem;font-weight:500;cursor:pointer;border:none;font-family:inherit;
  transition:all .18s;text-decoration:none;white-space:nowrap}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,var(--blue2),var(--blue));color:#fff;
  box-shadow:0 2px 12px var(--blue-glow)}
.btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 20px rgba(37,99,235,.4)}
.btn-green{background:linear-gradient(135deg,var(--green2),var(--green));color:#fff;
  box-shadow:0 2px 10px var(--green-glow)}
.btn-green:hover:not(:disabled){transform:translateY(-1px)}
.btn-ghost{background:var(--bg3);color:var(--t2);border:1px solid var(--border)}
.btn-ghost:hover:not(:disabled){background:var(--bg4);color:var(--t1);border-color:var(--border2)}
.btn-danger{background:var(--red-glow);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.btn-danger:hover:not(:disabled){background:rgba(239,68,68,.25)}
.btn-sm{padding:6px 12px;font-size:.78rem}
.btn-xs{padding:4px 9px;font-size:.73rem}
.btn-icon{padding:7px;border-radius:var(--r3)}
.btn-full{width:100%;justify-content:center;padding:12px}

/* ── APP LAYOUT ── */
#app-screen{flex-direction:row}
.sidebar{width:250px;background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:200;
  transition:transform .28s cubic-bezier(.4,0,.2,1)}
.sidebar-hidden{transform:translateX(-100%)}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo-icon{width:34px;height:34px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,var(--blue2),var(--green));
  display:flex;align-items:center;justify-content:center;font-size:16px}
.sb-logo-text{font-weight:700;font-size:.95rem;letter-spacing:-.02em}
.sb-logo-sub{font-size:.65rem;color:var(--green);font-weight:600}
.sb-nav{flex:1;overflow-y:auto;padding:10px 8px}
.sb-section-label{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
  color:var(--t3);padding:0 8px;margin:12px 0 4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r3);
  color:var(--t2);font-size:.84rem;font-weight:500;cursor:pointer;
  transition:all .15s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--bg3);color:var(--t1)}
.nav-item.active{background:var(--blue-glow);color:var(--blue2);font-weight:600}
.nav-item svg{flex-shrink:0;width:17px;height:17px}
.sb-footer{padding:12px 8px;border-top:1px solid var(--border)}
.sb-user{display:flex;align-items:center;gap:9px;padding:8px 8px 10px}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--blue-glow);
  border:1px solid var(--blue2);display:flex;align-items:center;justify-content:center;
  font-size:.72rem;font-weight:700;color:var(--blue2);flex-shrink:0}
.avatar-lg{width:52px;height:52px;font-size:1.1rem;font-weight:800;
  background:linear-gradient(135deg,var(--blue),var(--green));color:#fff;border:none}
.user-name{font-size:.78rem;font-weight:600}
.user-role{font-size:.68rem;color:var(--t3)}
.main{flex:1;margin-left:250px;display:flex;flex-direction:column;min-height:100vh;transition:margin .28s}
.main-full{margin-left:0}
.topbar{height:58px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;padding:0 20px;position:sticky;top:0;z-index:100}
.topbar-title{font-weight:600;font-size:.95rem;flex:1}
.page{flex:1;padding:22px;display:flex;flex-direction:column;gap:20px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:199}
.overlay.show{display:block}

/* ── CARDS & STATS ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px}
.card-hover{transition:box-shadow .2s,border-color .2s}
.card-hover:hover{border-color:var(--border2);box-shadow:0 4px 20px rgba(0,0,0,.35)}
.grid{display:grid;gap:14px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.stat{display:flex;align-items:center;gap:13px}
.stat-ico{width:44px;height:44px;border-radius:var(--r3);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:20px}
.stat-label{font-size:.7rem;color:var(--t2);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.stat-val{font-size:1.35rem;font-weight:700;line-height:1.1;margin-top:1px}
.stat-sub{font-size:.7rem;color:var(--t3);margin-top:2px}

/* ── SECTION HEADER ── */
.sec-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.sec-title{display:flex;align-items:center;gap:8px;font-size:1rem;font-weight:600}
.page-title{font-size:1.4rem;font-weight:700;letter-spacing:-.02em}
.page-sub{font-size:.82rem;color:var(--t2);margin-top:2px}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:99px;
  font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.badge-green{background:rgba(16,185,129,.15);color:var(--green2);border:1px solid rgba(16,185,129,.25)}
.badge-red{background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.25)}
.badge-amber{background:rgba(245,158,11,.15);color:#fcd34d;border:1px solid rgba(245,158,11,.25)}
.badge-blue{background:rgba(59,130,246,.15);color:#93c5fd;border:1px solid rgba(59,130,246,.25)}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;border-radius:var(--r)}
table{width:100%;border-collapse:collapse;font-size:.84rem}
thead th{background:var(--bg3);color:var(--t2);font-size:.68rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;padding:11px 14px;text-align:left;
  border-bottom:1px solid var(--border)}
tbody td{padding:11px 14px;border-bottom:1px solid var(--border)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--bg3)}
tbody tr{cursor:default}
tbody tr.clickable{cursor:pointer}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
  backdrop-filter:blur(4px);z-index:500;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);
  width:100%;max-width:500px;max-height:92vh;overflow-y:auto;
  box-shadow:var(--sh);animation:slideUp .2s ease}
.modal-head{display:flex;align-items:center;justify-content:space-between;
  padding:18px 22px;border-bottom:1px solid var(--border)}
.modal-head h3{font-size:1rem;font-weight:600}
.modal-body{padding:20px 22px;display:flex;flex-direction:column;gap:14px}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;padding:14px 22px;border-top:1px solid var(--border)}

/* ── ALERTS ── */
.alert{display:flex;align-items:flex-start;gap:9px;padding:11px 14px;
  border-radius:var(--r3);font-size:.83rem}
.alert svg{width:16px;height:16px;flex-shrink:0;margin-top:1px}
.alert-amber{background:var(--amber-glow);border:1px solid rgba(245,158,11,.25);color:#fcd34d}
.alert-red{background:var(--red-glow);border:1px solid rgba(239,68,68,.25);color:#fca5a5}
.alert-blue{background:var(--blue-glow);border:1px solid rgba(37,99,235,.25);color:#93c5fd}
.alert-green{background:var(--green-glow);border:1px solid rgba(16,185,129,.25);color:var(--green2)}

/* ── TABS ── */
.tabs{display:flex;gap:3px;background:var(--bg3);padding:3px;border-radius:var(--r3);
  border:1px solid var(--border);width:fit-content;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:5px;font-size:.78rem;font-weight:500;cursor:pointer;
  border:none;background:none;color:var(--t3);font-family:inherit;transition:all .15s}
.tab.active{background:var(--blue);color:#fff}
.tab:hover:not(.active){color:var(--t1);background:var(--border)}

/* ── SEARCH ── */
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);
  color:var(--t3);pointer-events:none;width:15px;height:15px}
.search-wrap input{padding-left:34px}

/* ── MISC ── */
.divider{height:1px;background:var(--border);margin:6px 0}
.empty{text-align:center;padding:40px 20px;color:var(--t3)}
.empty-ico{font-size:32px;margin-bottom:8px;opacity:.5}
.empty p{font-size:.85rem}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue2);
  border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;
  font-size:.7rem;font-weight:600;background:var(--bg3);border:1px solid var(--border);color:var(--t2)}
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px}
.info-item .info-lbl{font-size:.68rem;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.info-item .info-val{font-size:.9rem;font-weight:500}
.total-row{background:var(--bg3);font-weight:700}

/* ── ANIMATIONS ── */
@keyframes slideUp{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .g2,.g3,.g4{grid-template-columns:1fr}
  .page{padding:14px}
  .modal-foot{flex-direction:column-reverse}
  .modal-foot .btn{width:100%;justify-content:center}
  .tabs{width:100%}
  .tab{flex:1;text-align:center}
  tbody tr:hover{background:transparent}
}
@media(max-width:480px){
  thead th,tbody td{padding:9px 10px}
  .stat-val{font-size:1.15rem}
  .page-title{font-size:1.2rem}
}


/* ═══════════════════════════════════════════════════════════
   PREMIUM VISUAL REFRESH v12 PRO
   Solo mejora visual: no cambia estructura, datos ni funciones JS
   ═══════════════════════════════════════════════════════════ */
:root{
  color-scheme:dark;
  --bg:#07111f;
  --bg2:rgba(15,23,42,.82);
  --bg3:rgba(30,41,59,.72);
  --bg4:rgba(51,65,85,.78);
  --border:rgba(148,163,184,.15);
  --border2:rgba(148,163,184,.28);
  --blue:#2563eb;
  --blue2:#60a5fa;
  --blue-glow:rgba(37,99,235,.28);
  --green:#10b981;
  --green2:#5eead4;
  --green-glow:rgba(16,185,129,.20);
  --red:#ef4444;
  --red-glow:rgba(239,68,68,.18);
  --amber:#f59e0b;
  --amber-glow:rgba(245,158,11,.18);
  --purple:#8b5cf6;
  --cyan:#22d3ee;
  --t1:#f8fafc;
  --t2:#b6c2d2;
  --t3:#738196;
  --r:18px;--r2:24px;--r3:13px;
  --sh:0 24px 80px rgba(0,0,0,.48),0 1px 0 rgba(255,255,255,.04) inset;
  --sh-soft:0 14px 40px rgba(2,6,23,.34);
}
html{background:#07111f}
body{
  background:
    radial-gradient(circle at 8% -8%,rgba(96,165,250,.26),transparent 30%),
    radial-gradient(circle at 100% 0%,rgba(16,185,129,.18),transparent 28%),
    radial-gradient(circle at 55% 105%,rgba(139,92,246,.14),transparent 35%),
    linear-gradient(180deg,#07111f 0%,#0b1220 52%,#080d17 100%);
  letter-spacing:-.01em;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:-1;opacity:.35;
  background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);
  background-size:48px 48px;
  mask-image:linear-gradient(to bottom,black,transparent 80%);
}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--blue2),var(--green2));border-radius:99px}

/* LOGIN PREMIUM */
#login-screen{
  background:
    radial-gradient(circle at 50% 0%,rgba(96,165,250,.32),transparent 34%),
    radial-gradient(circle at 0% 100%,rgba(16,185,129,.18),transparent 38%),
    linear-gradient(135deg,#07111f,#0f172a 55%,#06131f);
}
.login-box{max-width:440px;animation:fadeIn .45s ease both}
.logo-icon,.sb-logo-icon{
  background:linear-gradient(135deg,#38bdf8 0%,#2563eb 42%,#10b981 100%);
  box-shadow:0 18px 50px rgba(37,99,235,.32),0 0 0 1px rgba(255,255,255,.16) inset;
}
.logo-icon{width:72px;height:72px;border-radius:22px;font-size:32px;margin-bottom:18px}
.login-logo h1{font-size:2rem;letter-spacing:-.055em;background:linear-gradient(135deg,#fff,#bfdbfe 45%,#99f6e4);-webkit-background-clip:text;background-clip:text;color:transparent}
.login-logo p{font-size:.88rem;color:#afbdd1}
.login-card{
  position:relative;overflow:hidden;padding:32px;border-radius:26px;
  background:linear-gradient(180deg,rgba(15,23,42,.88),rgba(15,23,42,.70));
  border:1px solid rgba(255,255,255,.12);box-shadow:var(--sh);backdrop-filter:blur(20px);
}
.login-card::before,.card::before,.modal::before{
  content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background:linear-gradient(135deg,rgba(255,255,255,.13),transparent 34%,rgba(94,234,212,.055));
  opacity:.9;
}
.login-card h2{font-size:1.18rem;margin-bottom:22px}
.login-hint{color:#7f8da3}.login-hint span{color:#93c5fd;font-weight:700}

/* LAYOUT */
.sidebar{
  width:270px;background:rgba(7,13,24,.80);border-right:1px solid rgba(148,163,184,.14);
  box-shadow:20px 0 60px rgba(0,0,0,.24);backdrop-filter:blur(22px);
}
.main{margin-left:270px}.main-full{margin-left:0}
.sb-logo{padding:22px 18px 18px;border-bottom:1px solid rgba(148,163,184,.14)}
.sb-logo-icon{width:40px;height:40px;border-radius:14px}.sb-logo-text{font-size:1rem}.sb-logo-sub{color:#5eead4}
.sb-nav{padding:14px 10px}.sb-section-label{padding:0 10px;margin:16px 0 7px;color:#64748b}
.nav-item{border-radius:14px;padding:11px 12px;font-size:.88rem;position:relative}
.nav-item:hover{background:rgba(96,165,250,.10);color:#e2e8f0;transform:translateX(2px)}
.nav-item.active{background:linear-gradient(135deg,rgba(37,99,235,.24),rgba(16,185,129,.12));color:#dbeafe;box-shadow:0 0 0 1px rgba(96,165,250,.22) inset}
.nav-item.active::before{content:"";position:absolute;left:0;top:9px;bottom:9px;width:3px;border-radius:99px;background:linear-gradient(#60a5fa,#5eead4)}
.sb-footer{border-top:1px solid rgba(148,163,184,.14);padding:14px 10px;background:rgba(2,6,23,.18)}
.topbar{
  height:66px;background:rgba(7,13,24,.68);border-bottom:1px solid rgba(148,163,184,.14);
  backdrop-filter:blur(18px);box-shadow:0 10px 32px rgba(2,6,23,.18);padding:0 24px;
}
.topbar-title{font-size:1.02rem}.page{padding:28px;gap:24px}
.overlay.show{backdrop-filter:blur(2px)}

/* CARDS */
.card{
  position:relative;overflow:hidden;background:linear-gradient(180deg,rgba(15,23,42,.82),rgba(15,23,42,.62));
  border:1px solid rgba(148,163,184,.16);border-radius:var(--r);box-shadow:var(--sh-soft);backdrop-filter:blur(14px);
}
.card-hover{transition:transform .22s ease,box-shadow .22s ease,border-color .22s ease,background .22s ease}
.card-hover:hover{transform:translateY(-3px);border-color:rgba(96,165,250,.36);box-shadow:0 22px 55px rgba(2,6,23,.42)}
.grid{gap:18px}.g4{grid-template-columns:repeat(4,minmax(0,1fr))}.g3{grid-template-columns:repeat(3,minmax(0,1fr))}.g2{grid-template-columns:repeat(2,minmax(0,1fr))}
.stat{padding:20px;align-items:center}.stat-ico{width:52px;height:52px;border-radius:17px;box-shadow:0 12px 26px rgba(0,0,0,.18);font-size:23px}

<!-- Firebase SDK (modular, v10) -->
<script type="module">
  import { initializeApp, deleteApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged,
    createUserWithEmailAndPassword, setPersistence, browserLocalPersistence,
    inMemoryPersistence
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc,
    collection, getDocs, query, orderBy, writeBatch, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCQI9QnqAr5PdtPh-WJvz4iSv9IanNE9RA",
    authDomain: "control-laboral-1b451.firebaseapp.com",
    projectId: "control-laboral-1b451",
    storageBucket: "control-laboral-1b451.firebasestorage.app",
    messagingSenderId: "29120735729",
    appId: "1:29120735729:web:59c1e9de46909aeed8fc5b"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  setPersistence(auth, browserLocalPersistence);

  // Crea la cuenta de un trabajador SIN afectar la sesión activa del admin.
  // Usa una app secundaria de Firebase, exclusiva para esta operación,
  // que se destruye apenas termina.
  async function createWorkerAccount(email, password) {
    const secondaryApp = initializeApp(firebaseConfig, 'worker-creator-' + Date.now());
    const secondaryAuth = getAuth(secondaryApp);
    await setPersistence(secondaryAuth, inMemoryPersistence);
    try {
      const cred = await createUserWithEmailAndPassword(secondaryAuth, email, password);
      const uid = cred.user.uid;
      await signOut(secondaryAuth);
      await deleteApp(secondaryApp);
      return uid;
    } catch (err) {
      await deleteApp(secondaryApp);
      throw err;
    }
  }

  // Expose to the global (non-module) script below
  window.__fb = {
    auth, db,
    signInWithEmailAndPassword, signOut, onAuthStateChanged, createUserWithEmailAndPassword,
    doc, getDoc, setDoc, updateDoc, deleteDoc,
    collection, getDocs, query, orderBy, writeBatch, serverTimestamp,
    createWorkerAccount
  };
  window.dispatchEvent(new Event('firebase-ready'));
</script>

<script>
// ═══════════════════════════════════════════════════════════
// FIREBASE-BACKED DATA LAYER
// DB se mantiene en memoria con la MISMA forma que antes para
// no tocar el resto de la app, pero ahora se carga desde
// Firestore al iniciar sesión y cada cambio se sincroniza.
// ═══════════════════════════════════════════════════════════
let DB = {
  workers: [],
  advances: {},
  loans: {},
  vacations: {},
  production: {},
  packages: {},
  vehicleHistory: {},
};
const DEDUCTION_FIJA = 180000; // imposiciones para trabajadores por producción
const DEFAULT_PACKAGE_RATE = 750; // valor por bulto por defecto

let fb = null; // se asigna cuando firebase-ready dispara
window.addEventListener('firebase-ready', () => { fb = window.__fb; });

// ── Cargar TODOS los datos del empleador desde Firestore ────
async function loadAllDataFromFirestore(){
  const { db, collection, getDocs, doc, getDoc } = fb;

  const workersSnap = await getDocs(collection(db, 'workers'));
  DB.workers = [];
  DB.advances = {}; DB.loans = {}; DB.vacations = {};
  DB.production = {}; DB.packages = {}; DB.vehicleHistory = {};

  for (const wDoc of workersSnap.docs) {
    const wid = wDoc.id;
    DB.workers.push({ id: wid, ...wDoc.data() });

    const [advSnap, loanSnap, vacSnap, prodSnap, pkgSnap, vehSnap] = await Promise.all([
      getDocs(collection(db, 'workers', wid, 'advances')),
      getDocs(collection(db, 'workers', wid, 'loans')),
      getDocs(collection(db, 'workers', wid, 'vacations')),
      getDocs(collection(db, 'workers', wid, 'production')),
      getDocs(collection(db, 'workers', wid, 'packages')),
      getDocs(collection(db, 'workers', wid, 'vehicleHistory')),
    ]);

    DB.advances[wid] = advSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    DB.vacations[wid] = vacSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    DB.production[wid] = prodSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    DB.packages[wid] = pkgSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    DB.vehicleHistory[wid] = vehSnap.docs.map(d => ({ id: d.id, ...d.data() }));

    // loans + their payments sub-collection
    const loans = [];
    for (const lDoc of loanSnap.docs) {
      const paySnap = await getDocs(collection(db, 'workers', wid, 'loans', lDoc.id, 'payments'));
      loans.push({ id: lDoc.id, ...lDoc.data(), payments: paySnap.docs.map(p => ({ id: p.id, ...p.data() })) });
    }
    DB.loans[wid] = loans;
  }
}

// ── Helpers genéricos de escritura a Firestore ───────────────
function fsId(){ return fb.doc(fb.collection(fb.db,'_')).id; } // genera un ID único estilo Firestore

async function fsSetWorker(wid, data){
  await fb.setDoc(fb.doc(fb.db,'workers',wid), data, { merge: true });
}
async function fsDeleteWorker(wid){
  const sub = ['advances','loans','vacations','production','packages','vehicleHistory'];
  for (const s of sub) {
    const snap = await fb.getDocs(fb.collection(fb.db,'workers',wid,s));
    for (const d of snap.docs) await fb.deleteDoc(d.ref);
  }
  await fb.deleteDoc(fb.doc(fb.db,'workers',wid));
}
async function fsAddSub(wid, sub, id, data){
  await fb.setDoc(fb.doc(fb.db,'workers',wid,sub,id), data);
}
async function fsDeleteSub(wid, sub, id){
  await fb.deleteDoc(fb.doc(fb.db,'workers',wid,sub,id));
}
async function fsAddPayment(wid, lid, pid, data){
  await fb.setDoc(fb.doc(fb.db,'workers',wid,'loans',lid,'payments',pid), data);
}
async function fsDeletePayment(wid, lid, pid){
  await fb.deleteDoc(fb.doc(fb.db,'workers',wid,'loans',lid,'payments',pid));
}
async function fsDeleteLoan(wid, lid){
  const paySnap = await fb.getDocs(fb.collection(fb.db,'workers',wid,'loans',lid,'payments'));
  for (const p of paySnap.docs) await fb.deleteDoc(p.ref);
  await fb.deleteDoc(fb.doc(fb.db,'workers',wid,'loans',lid));
}



// ── State ──────────────────────────────────────────────────
let currentUser = null;
let currentPage = 'dashboard';
let sidebarOpen = false;

// ═══════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════
async function doLogin(){
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const pass  = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  const errMsg= document.getElementById('login-error-msg');
  const btn = document.getElementById('login-btn');

  if(!email || !pass){
    errEl.style.display='flex'; errMsg.textContent='Ingrese correo y contraseña.'; return;
  }
  if(!fb){
    errEl.style.display='flex'; errMsg.textContent='Conectando con el servidor, intente nuevamente en un segundo.'; return;
  }

  errEl.style.display='none';
  if(btn){ btn.disabled = true; btn.innerHTML = '<span class="spinner" style="width:16px;height:16px"></span> Ingresando...'; }

  try {
    const cred = await fb.signInWithEmailAndPassword(fb.auth, email, pass);
    const profileSnap = await fb.getDoc(fb.doc(fb.db, 'users', cred.user.uid));
    if(!profileSnap.exists()){
      throw { code: 'app/no-profile' };
    }
    const profile = profileSnap.data();

    await loadAllDataFromFirestore();

    if(profile.role === 'admin'){
      currentUser = { uid: cred.user.uid, email, role:'admin', name: profile.name || 'Administrador', initials: (profile.name||'AD').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() };
    } else {
      const w = DB.workers.find(x=>x.id===profile.workerId);
      currentUser = { uid: cred.user.uid, email, role:'worker', workerId: profile.workerId, name: w?.fullName || email, initials: (w?.fullName||email).split(' ').map(s=>s[0]).join('').slice(0,2).toUpperCase() };
    }
    startApp();
  } catch(err) {
    const msg = {
      'auth/invalid-credential': 'Correo o contraseña incorrectos.',
      'auth/invalid-email': 'El correo ingresado no es válido.',
      'auth/user-not-found': 'No existe una cuenta con ese correo.',
      'auth/wrong-password': 'Contraseña incorrecta.',
      'auth/too-many-requests': 'Demasiados intentos. Espere unos minutos.',
      'app/no-profile': 'Esta cuenta no tiene un perfil asignado. Contacte al administrador.',
    }[err.code] || 'Error al iniciar sesión. Intente nuevamente.';
    errEl.style.display='flex'; errMsg.textContent = msg;
  } finally {
    if(btn){ btn.disabled = false; btn.innerHTML = 'Ingresar →'; }
  }
}

document.getElementById('login-pass').addEventListener('keydown', e => e.key==='Enter' && doLogin());
document.getElementById('login-email').addEventListener('keydown', e => e.key==='Enter' && doLogin());

async function doLogout(){
  try { await fb.signOut(fb.auth); } catch(e){}
  currentUser=null;
  document.getElementById('login-screen').classList.add('active');
  document.getElementById('app-screen').classList.remove('active');
  document.getElementById('login-email').value='';
  document.getElementById('login-pass').value='';
}

// ═══════════════════════════════════════════════════════════
// APP INIT
// ═══════════════════════════════════════════════════════════
function startApp(){
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('app-screen').classList.add('active');
  document.getElementById('sb-username').textContent = currentUser.name;
  document.getElementById('sb-email').textContent = currentUser.email;
  document.getElementById('sb-avatar').textContent = currentUser.initials;
  document.getElementById('tb-avatar').textContent = currentUser.initials;
  document.getElementById('sb-role-label').textContent = currentUser.role==='admin'?'Administrador':'Trabajador';
  buildSidebar();
  navigate('dashboard');
}

function buildSidebar(){
  const nav = document.getElementById('sb-nav');
  const isAdmin = currentUser.role === 'admin';
  let html = '';
  if(isAdmin){
    html += `<div class="sb-section-label">Principal</div>
    <button class="nav-item" onclick="navigate('dashboard')">
      ${ico('dashboard')} Dashboard
    </button>
    <div class="sb-section-label">Gestión</div>
    <button class="nav-item" onclick="navigate('workers')">
      ${ico('users')} Trabajadores
    </button>
    <button class="nav-item" onclick="navigate('advances')">
      ${ico('dollar')} Anticipos
    </button>
    <button class="nav-item" onclick="navigate('loans')">
      ${ico('credit')} Préstamos
    </button>
    <button class="nav-item" onclick="navigate('vacations')">
      ${ico('umbrella')} Vacaciones
    </button>
    <div class="sb-section-label">Informes</div>
    <button class="nav-item" onclick="navigate('reports')">
      ${ico('chart')} Reportes
    </button>`;
  } else {
    const wid=currentUser.workerId;
    const wType=(DB.workers.find(w=>w.id===wid)||{}).workerType || 'fixed';
    html += `<div class="sb-section-label">Principal</div>
    <button class="nav-item" onclick="navigate('dashboard')">
      ${ico('dashboard')} Mi Dashboard
    </button>
    <div class="sb-section-label">Mi Información</div>
    ${wType==='production'?`<button class="nav-item" onclick="navigate('my-production')">📦 Mi Producción</button>`:''}
    ${wType==='packages'?`<button class="nav-item" onclick="navigate('my-packages')">🚚 Mis Encomiendas</button>`:''}
    <button class="nav-item" onclick="navigate('my-advances')">
      ${ico('dollar')} Mis Anticipos
    </button>
    <button class="nav-item" onclick="navigate('my-loans')">
      ${ico('credit')} Mis Préstamos
    </button>
    ${wType==='fixed'?`<button class="nav-item" onclick="navigate('my-vacations')">${ico('umbrella')} Mis Vacaciones</button>`:''}`;
  }
  nav.innerHTML = html;
}

function ico(name){

function navigate(page, param){
  currentPage = page;
  closeSidebar();
  // update nav active
  document.querySelectorAll('.nav-item').forEach(el=>{
    const fn = el.getAttribute('onclick')||'';
    el.classList.toggle('active', fn.includes(`'${page}'`) || fn.includes(`"${page}"`));
  });
  // page title
  const titles = {
    dashboard:'Dashboard', workers:'Trabajadores', advances:'Anticipos',
    loans:'Préstamos', vacations:'Vacaciones', reports:'Reportes',
    'worker-detail':'Detalle Trabajador',
    'my-advances':'Mis Anticipos','my-loans':'Mis Préstamos','my-vacations':'Mis Vacaciones',
    'my-production':'Mi Producción','my-packages':'Mis Encomiendas',
  };
  document.getElementById('topbar-title').textContent = titles[page] || page;

  const c = document.getElementById('page-container');
  c.innerHTML = '';

  if(currentUser.role==='admin'){
    if(page==='dashboard') renderAdminDashboard(c);
    else if(page==='workers') renderWorkersList(c);
    else if(page==='worker-detail') renderWorkerDetail(c, param);
    else if(page==='advances') renderAdvancesOverview(c);
    else if(page==='loans') renderLoansOverview(c);
    else if(page==='vacations') renderVacationsOverview(c);
    else if(page==='reports') renderReports(c);
    else renderAdminDashboard(c);
  } else {
    const wid = currentUser.workerId;
    const wType = (DB.workers.find(w=>w.id===wid)||{}).workerType || 'fixed';
    if(page==='dashboard') renderWorkerDashboard(c, wid);
    else if(page==='my-advances') renderWorkerAdvances(c, wid);
    else if(page==='my-loans') renderWorkerLoans(c, wid);
    else if(page==='my-vacations') renderWorkerVacations(c, wid);
    else if(page==='my-production') renderWorkerProduction(c, wid);
    else if(page==='my-packages') renderWorkerPackages(c, wid);
    else renderWorkerDashboard(c, wid);
  }
}

const $ = id => document.getElementById(id);
const money = n => '$' + Number(n||0).toLocaleString('es-CL');
const fmtDate = d => d ? new Date(d+'T00:00:00').toLocaleDateString('es-CL') : '—';
function calcVac(wid){
  const w = DB.workers.find(x=>x.id===wid);
  if(!w||!w.entryDate) return {generated:0,used:0,sold:0,available:0,periodStart:'',periodEnd:''};
  const entry = new Date(w.entryDate);
  const now = new Date();
  const msY = 365.25*24*3600*1000;
  const years = (now-entry)/msY;
  const generated = Math.floor(years * 15);
  const movs = DB.vacations[wid]||[];
  const used = movs.filter(m=>m.type==='used').reduce((s,m)=>s+(m.days||0),0);
  const sold = movs.filter(m=>m.type==='sold').reduce((s,m)=>s+(m.days||0),0);
  const available = Math.max(0, generated-used-sold);
  // period
  const ps = new Date(entry);
  while(ps.getTime()+msY <= now.getTime()) ps.setFullYear(ps.getFullYear()+1);
  const pe = new Date(ps); pe.setFullYear(pe.getFullYear()+1);
  return {generated,used,sold,available,
    periodStart:ps.toISOString().split('T')[0],
    periodEnd:pe.toISOString().split('T')[0]};
}
function loanBalance(l){
  const paid=(l.payments||[]).reduce((s,p)=>s+(p.amount||0),0);
  return {paid, balance:Math.max(0,(l.amount||0)-paid)};
}
function totalAdvances(wid){ return (DB.advances[wid]||[]).reduce((s,a)=>s+(a.amount||0),0); }
function totalLoanBalance(wid){ return (DB.loans[wid]||[]).reduce((s,l)=>s+loanBalance(l).balance,0); }
function uid(){ return 'id_'+(Date.now())+'_'+(Math.random()*1000|0); }
function statusBadge(s){ return s==='active'?'<span class="badge badge-green">Activo</span>':'<span class="badge badge-red">Inactivo</span>'; }
function toggleSidebar(){ sidebarOpen=!sidebarOpen; document.getElementById('sidebar').classList.toggle('open',sidebarOpen); document.getElementById('sidebar-overlay').classList.toggle('show',sidebarOpen); }
function closeSidebar(){ sidebarOpen=false; document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('show'); }
function workerTypeLabel(t){ return t==='production'?'Por Producción':t==='packages'?'Por Encomiendas':'Sueldo Fijo'; }
function workerTypeBadgeClass(t){ return t==='production'?'badge-blue':t==='packages'?'badge-amber':'badge-green'; }
function monthLabel(ym){
  if(!ym) return '—';
  const [y,m]=ym.split('-');
  const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  return meses[Number(m)-1]+' '+y;
}
// ── PRODUCTION HELPERS ──────────────────────────────────────
function productionNet(p){ return Math.max(0, (p.total||0) - DEDUCTION_FIJA); }
function currentMonthProduction(wid){
  const recs=DB.production[wid]||[];
  const ym=new Date().toISOString().slice(0,7);
  return recs.find(p=>p.month===ym) || recs[0] || null;
}
// ── PACKAGES HELPERS ────────────────────────────────────────
function packageNet(p){ return Math.max(0,(p.sent||0)-(p.returns||0)) * (p.rate||0); }
function packagesMonthTotal(wid, ym){
  const recs=(DB.packages[wid]||[]).filter(p=>!ym || p.date.slice(0,7)===ym);
  return recs.reduce((s,p)=>s+packageNet(p),0);
}
function packagesCurrentMonthKey(){ return new Date().toISOString().slice(0,7); }
// ── VEHICLE HISTORY HELPERS ─────────────────────────────────
function currentReplacementVehicle(wid){
  const hist=DB.vehicleHistory[wid]||[];
  return hist.find(v=>!v.endDate) || null;
}

      <span style="font-size:.74rem;color:var(--t3)">El trabajador usará su correo y esta contraseña para entrar. Podrá ser cambiada después.</span>

function formatRutInput(input){
  let v = input.value.replace(/[^0-9kK]/g,'').toUpperCase();
  if(v.length>9) v = v.slice(0,9);
  if(v.length<=1){ input.value=v; return; }
  let body = v.slice(0,-1);
  let dv = v.slice(-1);
  let formatted = '';
  while(body.length>3){
    formatted = '.'+body.slice(-3)+formatted;
    body = body.slice(0,-3);
  }
  formatted = body + formatted;
  input.value = formatted + '-' + dv;
}
async function saveWorker(wid){
  const name=$('wf-name').value.trim();
  const email=$('wf-email').value.trim();
  const date=$('wf-date').value;
  if(!name||!email||!date){alert('Complete los campos obligatorios');return;}
  if(!wid){
    const pass = $('wf-password').value;
    if(!pass || pass.length < 6){ alert('Ingrese una contraseña inicial de al menos 6 caracteres'); return; }
  }
  const phoneDigits=$('wf-phone').value.trim();
  const phone = phoneDigits ? '+56 9 '+phoneDigits.replace(/(\d{4})(\d{0,4})/,'$1 $2').trim() : '';
  const data={fullName:name,rut:$('wf-rut').value,phone,
    position:$('wf-pos').value,email,entryDate:date,status:$('wf-status').value,
    workerType:$('wf-type').value,
    birthDate:$('wf-birthdate').value,
    vehiclePlate:$('wf-plate').value.trim(),
    afp:$('wf-afp').value,
    health:$('wf-health').value.trim()};

  const saveBtn = document.querySelector('#modal-foot .btn-primary');
  if(saveBtn){ saveBtn.disabled = true; saveBtn.innerHTML = '<span class="spinner" style="width:14px;height:14px"></span> Guardando…'; }

  try {
    if(wid){
      const i=DB.workers.findIndex(w=>w.id===wid);
      DB.workers[i]={...DB.workers[i],...data};
      await fsSetWorker(wid, data);
    } else {
      const pass = $('wf-password').value;
      // 1. Crear cuenta en Firebase Authentication (sin afectar la sesión del admin)
      const uid = await fb.createWorkerAccount(email, pass);
      // 2. Crear el documento del trabajador usando el UID como ID
      const id = uid;
      DB.workers.push({id,...data});
      DB.advances[id]=[]; DB.loans[id]=[];
      DB.vacations[id]=[]; DB.production[id]=[]; DB.packages[id]=[]; DB.vehicleHistory[id]=[];
      await fsSetWorker(id, data);
      // 3. Crear el perfil de usuario que vincula el login con el trabajador
      await fb.setDoc(fb.doc(fb.db, 'users', uid), { role: 'worker', workerId: id, email });
    }
    closeModal(); navigate('workers');
  } catch(err) {
    const msg = {
      'auth/email-already-in-use': 'Ese correo ya está registrado en el sistema.',
      'auth/invalid-email': 'El correo ingresado no es válido.',
      'auth/weak-password': 'La contraseña es muy débil (mínimo 6 caracteres).',
    }[err.code] || 'Error al guardar. Intente nuevamente.';
    alert(msg);
  } finally {
    if(saveBtn){ saveBtn.disabled = false; saveBtn.innerHTML = wid ? 'Actualizar' : 'Crear Trabajador'; }
  }
}

async function saveProduction(wid,pid){
  const month=$('prf-month').value; const total=Number($('prf-total').value); const note=$('prf-note').value;
  if(!month||!total){alert('Ingrese mes y total de producción');return;}
  if(!DB.production[wid]) DB.production[wid]=[];
  try {
    if(pid){
      const i=DB.production[wid].findIndex(p=>p.id===pid);
      DB.production[wid][i]={...DB.production[wid][i],month,total,note};
      await fsAddSub(wid,'production',pid,{month,total,note});

}

// ── WORKER VIEWS ──────────────────────────────────────────
// ═══════════════════════════════════════════════════════════
function renderWorkerDashboard(c, wid){
  const w=DB.workers.find(x=>x.id===wid);
  if(!w){c.innerHTML='<p>Sin datos</p>';return;}
  const adv=totalAdvances(wid); const loan=totalLoanBalance(wid); const vac=calcVac(wid);
  const initials=w.fullName.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  const hoy=new Date().toLocaleDateString('es-CL',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const type=w.workerType||'fixed';

  let thirdCard='';
  if(type==='production'){
    const rec=currentMonthProduction(wid);
    const net=rec?productionNet(rec):0;
    thirdCard=statCard('📦','Producción del Mes',money(net),rec?monthLabel(rec.month)+' (neto)':'Sin registro','var(--blue2)','cursor:pointer','navigate(\'my-production\')');
  } else if(type==='packages'){
    const ym=packagesCurrentMonthKey();
    const net=packagesMonthTotal(wid,ym);
    thirdCard=statCard('🚚','Encomiendas del Mes',money(net),monthLabel(ym)+' (neto)','var(--blue2)','cursor:pointer','navigate(\'my-packages\')');
  } else {
    thirdCard=statCard('🏖️','Vacaciones Disponibles',vac.available+' días','Período hasta '+fmtDate(vac.periodEnd),'var(--green)','cursor:pointer','navigate(\'my-vacations\')');
  }

  c.innerHTML=`
    <div>
      <div class="page-title">Hola, ${w.fullName.split(' ')[0]} 👋</div>
      <div class="page-sub" style="text-transform:capitalize">${hoy}</div>
    </div>
    <div class="card" style="background:linear-gradient(135deg,var(--bg3),var(--bg2));border-color:var(--border2)">
      <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
        <div class="avatar avatar-lg">${initials}</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:1.1rem">${w.fullName}</div>
          <div style="font-size:.83rem;color:var(--t2);margin-top:2px">${w.position}${w.rut?' · '+w.rut:''}</div>
          <div style="font-size:.78rem;color:var(--t3);margin-top:2px">Ingreso: ${fmtDate(w.entryDate)}</div>
          <div style="margin-top:6px"><span class="badge ${workerTypeBadgeClass(type)}">${workerTypeLabel(type)}</span></div>
        </div>
        ${statusBadge(w.status)}
      </div>
    </div>
    <div class="grid g3">
      ${statCard('💰','Anticipos Pendientes',money(adv),(DB.advances[wid]||[]).length+' movimientos','var(--amber)','cursor:pointer','navigate(\'my-advances\')')}
      ${statCard('💳','Préstamos Pendientes',money(loan),(DB.loans[wid]||[]).filter(l=>loanBalance(l).balance>0).length+' activos','var(--red)','cursor:pointer','navigate(\'my-loans\')')}
      ${thirdCard}
    </div>
    ${(DB.advances[wid]||[]).length?`
    <div class="card">
      <div class="sec-title" style="margin-bottom:14px">💰 Últimos Anticipos</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${(DB.advances[wid]||[]).slice(0,5).map(a=>`
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)">
            <div style="min-width:0">
              <div style="font-size:.82rem;color:var(--t2)">${fmtDate(a.date)}</div>
              ${a.note?`<div style="font-size:.78rem;color:var(--t3);margin-top:1px">${a.note}</div>`:''}
            </div>
            <div style="font-weight:700;color:var(--amber);flex-shrink:0">${money(a.amount)}</div>
          </div>`).join('')}
      </div>
    </div>`:''}`;
}

function renderWorkerAdvances(c, wid){
  const advs=DB.advances[wid]||[];
  const total=totalAdvances(wid);
  c.innerHTML=`
    <div><div class="page-title">Mis Anticipos</div><div class="page-sub">Historial de anticipos de sueldo</div></div>
    ${total>0?`<div class="alert alert-amber">💰 <span>Total pendiente: <strong>${money(total)}</strong></span></div>`:''}
    <div style="display:flex;flex-direction:column;gap:10px">
      ${advs.length?advs.map(a=>`
        <div class="card" style="padding:14px">
          <div style="font-weight:700;color:var(--amber);font-size:1rem">${money(a.amount)}</div>
          <div style="font-size:.8rem;color:var(--t2);margin-top:2px">${fmtDate(a.date)}</div>
          ${a.note?`<div style="font-size:.8rem;color:var(--t3);margin-top:2px">${a.note}</div>`:''}

function renderWorkerLoans(c, wid){
  const loans=DB.loans[wid]||[];
  const totalBal=totalLoanBalance(wid);
  c.innerHTML=`
    <div><div class="page-title">Mis Préstamos</div><div class="page-sub">Historial y saldo</div></div>
    ${totalBal>0?`<div class="alert alert-red">💳 <span>Saldo pendiente: <strong>${money(totalBal)}</strong></span></div>`:''}
    <div style="display:flex;flex-direction:column;gap:14px">
      ${loans.length?loans.map(l=>{
        const {paid,balance}=loanBalance(l);
        return `<div class="card">
          <div style="font-weight:700;font-size:1rem;margin-bottom:4px">Préstamo: ${money(l.amount)}</div>
          <div style="font-size:.83rem;color:var(--t2)">Fecha: ${fmtDate(l.date)}${l.note?' — '+l.note:''}</div>
          <div style="display:flex;gap:20px;margin-top:10px;font-size:.88rem;flex-wrap:wrap">
            <span>Pagado: <strong style="color:var(--green)">${money(paid)}</strong></span>
            <span>Saldo: <strong style="color:${balance>0?'var(--red)':'var(--green)'}">${money(balance)}</strong></span>
          </div>
          ${(l.payments||[]).length?`<div style="background:var(--bg3);border-radius:8px;overflow:hidden;margin-top:12px">
            <div style="padding:7px 14px;font-size:.68rem;color:var(--t3);font-weight:700;text-transform:uppercase;border-bottom:1px solid var(--border)">Pagos</div>
            ${l.payments.map(p=>`<div style="display:flex;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--border);font-size:.82rem">
              <span style="color:var(--t2)">${fmtDate(p.date)}${p.note?' — '+p.note:''}</span>
              <strong style="color:var(--green)">${money(p.amount)}</strong>
            </div>`).join('')}
          </div>`:''}</div>`;}).join(''):
        `<div class="card"><div class="empty"><div class="empty-ico">💳</div><p>Sin préstamos registrados</p></div></div>`}
    </div>`;
}

function renderWorkerVacations(c, wid){
  const vs=calcVac(wid);
  const movs=DB.vacations[wid]||[];
  c.innerHTML=`
    <div><div class="page-title">Mis Vacaciones</div><div class="page-sub">Estado y movimientos</div></div>
    <div class="grid g4">
      ${['Generados','Usados','Vendidos','Disponibles'].map((l,i)=>{
        const v=[vs.generated,vs.used,vs.sold,vs.available][i];
        const col=['var(--blue2)','var(--amber)','var(--red)','var(--green)'][i];
        return `<div class="card" style="text-align:center">
          <div style="font-size:2rem;font-weight:800;color:${col}">${v}</div>
          <div style="font-size:.7rem;color:var(--t3);text-transform:uppercase;letter-spacing:.05em">${l}</div>
        </div>`;}).join('')}
    </div>
    <div class="alert alert-blue">${ico('cal')} <span>Período actual: <strong>${fmtDate(vs.periodStart)}</strong> — <strong>${fmtDate(vs.periodEnd)}</strong></span></div>
    <div>
      <div class="sec-title" style="margin-bottom:12px">Historial de movimientos</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        ${movs.length?movs.map(v=>`
          <div class="card" style="padding:14px">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px">
              <span class="badge ${v.type==='used'?'badge-blue':'badge-amber'}">${v.type==='used'?'Utilizados':'Vendidos'}</span>
              <span style="font-weight:700;font-size:.9rem">${v.days} días</span>
            </div>
            <div style="font-size:.8rem;color:var(--t2)">${fmtDate(v.date)}</div>
            ${v.note?`<div style="font-size:.8rem;color:var(--t3);margin-top:2px">${v.note}</div>`:''}
          </div>`).join(''):`<div class="card"><div class="empty"><div class="empty-ico">🏖️</div><p>Sin movimientos registrados</p></div></div>`}
      </div>
    </div>`;
}

// ── WORKER (read-only) PRODUCTION VIEW ─────────────────────

  const recs=(DB.production[wid]||[]).slice().sort((a,b)=>b.month.localeCompare(a.month));
  c.innerHTML=`
    <div><div class="page-title">Mi Producción</div><div class="page-sub">Historial mensual de producción</div></div>
    <div class="alert alert-blue">${ico('cal')}<span>Se descuentan automáticamente <strong>${money(DEDUCTION_FIJA)}</strong> de imposiciones por cada mes.</span></div>
    <div style="display:flex;flex-direction:column;gap:10px">
      ${recs.length?recs.map(p=>{
        const net=productionNet(p);
        return `<div class="card">
          <div style="font-weight:700;font-size:.95rem">${monthLabel(p.month)}</div>
          ${p.note?`<div style="font-size:.8rem;color:var(--t2);margin-top:2px">${p.note}</div>`:''}
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px">
            <div style="background:var(--bg3);border-radius:8px;padding:9px;text-align:center">
              <div style="font-weight:700;color:var(--t1)">${money(p.total)}</div>
              <div style="font-size:.63rem;color:var(--t3);text-transform:uppercase">Producción</div>
            </div>
            <div style="background:var(--bg3);border-radius:8px;padding:9px;text-align:center">
              <div style="font-weight:700;color:var(--red)">−${money(DEDUCTION_FIJA)}</div>
              <div style="font-size:.63rem;color:var(--t3);text-transform:uppercase">Imposiciones</div>
            </div>
            <div style="background:var(--green-glow);border-radius:8px;padding:9px;text-align:center;border:1px solid rgba(16,185,129,.25)">
              <div style="font-weight:700;color:var(--green2)">${money(net)}</div>
              <div style="font-size:.63rem;color:var(--t3);text-transform:uppercase">Neto a Pagar</div>
            </div>
          </div>
        </div>`;
      }).join(''):`<div class="card"><div class="empty"><div class="empty-ico">📦</div><p>Sin registros de producción</p></div></div>`}

}

// ── WORKER (read-only) PACKAGES VIEW ────────────────────────
function renderWorkerPackages(c, wid){
  const recs=(DB.packages[wid]||[]).slice().sort((a,b)=>b.date.localeCompare(a.date));
  const ym=packagesCurrentMonthKey();
  const monthTotal=packagesMonthTotal(wid,ym);
  const months=[...new Set(recs.map(p=>p.date.slice(0,7)))];
  c.innerHTML=`
    <div><div class="page-title">Mis Encomiendas</div><div class="page-sub">Historial de bultos entregados</div></div>
    <div class="card" style="background:linear-gradient(135deg,var(--bg3),var(--bg2));border-color:var(--border2)">
      <div class="stat-label">Total Neto del Mes Actual</div>
      <div style="font-size:1.6rem;font-weight:800;color:var(--green2);margin-top:2px">${money(monthTotal)}</div>
      <div class="stat-sub">${monthLabel(ym)}</div>
    </div>
    <div class="alert alert-blue">${ico('cal')}<span>Fórmula: <strong>(enviados − devoluciones) × valor</strong></span></div>
    ${months.length?months.map(m=>{
      const dayRecs=recs.filter(p=>p.date.slice(0,7)===m);
      const mTotal=packagesMonthTotal(wid,m);
      return `<div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 4px;margin-bottom:8px">
          <span style="font-weight:600;font-size:.85rem;color:var(--t2)">${monthLabel(m)}</span>
          <span style="font-weight:700;color:var(--green2)">${money(mTotal)}</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px">
          ${dayRecs.map(p=>{
            const net=packageNet(p);
            return `<div class="card" style="padding:12px 14px">
              <div style="font-size:.8rem;color:var(--t2);margin-bottom:6px">${fmtDate(p.date)}</div>
              <div style="display:flex;gap:14px;flex-wrap:wrap;font-size:.82rem">
                <span>Enviados: <strong>${p.sent}</strong></span>
                <span style="color:var(--red)">Devol.: <strong>−${p.returns}</strong></span>
                <span>Valor: <strong>${money(p.rate)}</strong></span>
              </div>
              <div style="margin-top:6px;font-weight:700;color:var(--green2)">Neto: ${money(net)}</div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join(''):`<div class="card"><div class="empty"><div class="empty-ico">🚚</div><p>Sin registros de encomiendas</p></div></div>`}`;
}
